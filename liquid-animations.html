<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Liquid Button Animations</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="liquid-animations.css">
</head>
<body>
    <div class="container">
        <h1>Premium Liquid Button Animations</h1>
        <p class="subtitle">Tap to play the animation</p>
        
        <div class="buttons-grid">
            <div class="button-container">
                <h3>Aurora</h3>
                <button class="btn btn-aurora" type="button" data-duration="1200">
                    <span class="btn-text">GET STARTED</span>
                </button>
            </div>

            <div class="button-container">
                <h3>Aurora 02</h3>
                <button class="btn btn-aurora btn-aurora-2" type="button" data-duration="1400">
                    <span class="btn-text">GET STARTED</span>
                </button>
            </div>

            <div class="button-container">
                <h3>Liquid Wave</h3>
                <button class="btn btn-wave" type="button" data-duration="1000">
                    <span class="btn-text">GET STARTED</span>
                </button>
            </div>

            <div class="button-container">
                <h3>Liquid Wave 02</h3>
                <button class="btn btn-wave btn-wave-2" type="button" data-duration="1100">
                    <span class="btn-text">GET STARTED</span>
                </button>
            </div>

            <div class="button-container">
                <h3>Holographic</h3>
                <button class="btn btn-holo" type="button" data-duration="1500">
                    <span class="solid-layer" aria-hidden="true"></span>
                    <span class="shine-layer" aria-hidden="true"></span>
                    <span class="btn-text">GET STARTED</span>
                </button>
            </div>

            <div class="button-container">
                <h3>Holographic 02</h3>
                <button class="btn btn-holo btn-holo-2" type="button" data-duration="1700">
                    <span class="solid-layer" aria-hidden="true"></span>
                    <span class="shine-layer" aria-hidden="true"></span>
                    <span class="btn-text">GET STARTED</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        const buttons = Array.from(document.querySelectorAll('.btn'));

        for (const btn of buttons) {
            btn.addEventListener('click', () => {
                btn.classList.remove('is-active');
                void btn.offsetWidth;
                btn.classList.add('is-active');
            });
        }
    </script>
</body>
</html>
